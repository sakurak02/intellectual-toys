<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fffaf0">
  <title>#001 追いつけ！｜知的玩具工房</title>
  <style>
    :root {
      --ink: #25313c;
      --muted: #65727d;
      --paper: #fffdf8;
      --cream: #fff6dc;
      --road: #e3ded2;
      --turtle: #2e9d70;
      --rabbit: #ed6a5a;
      --sun: #f7c948;
      --line: #ded8ca;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 8%, #fff1b9 0 7%, transparent 7.2%),
        linear-gradient(180deg, #fffaf0 0%, #f4fbf8 100%);
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
      line-height: 1.6;
    }
    a { color: inherit; }
    .page { width: min(920px, calc(100% - 28px)); margin: 0 auto; padding: 20px 0 42px; }
    .back { display: inline-flex; gap: .4em; align-items: center; color: #52616b; font-size: .9rem; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    header { padding: 24px 4px 20px; }
    .number { margin: 0 0 3px; color: var(--rabbit); font-size: .8rem; font-weight: 800; letter-spacing: .14em; }
    h1 { margin: 0; font-size: clamp(2rem, 8vw, 3.6rem); line-height: 1.15; letter-spacing: .03em; }
    .subtitle { margin-left: .4em; color: var(--muted); font-size: .42em; font-weight: 600; white-space: nowrap; }
    .lead { margin: 10px 0 0; font-size: clamp(1rem, 3.5vw, 1.25rem); font-weight: 700; }
    .card { background: rgba(255,255,255,.9); border: 1px solid rgba(222,216,202,.85); border-radius: 24px; box-shadow: 0 12px 34px rgba(48,68,61,.08); }
    .playground { overflow: hidden; }
    .sky { position: relative; min-height: 260px; padding: 22px 20px 0; background: linear-gradient(#dff5ff 0 69%, #e8f2c8 69%); }
    .cloud { position: absolute; color: rgba(255,255,255,.92); font-size: 3rem; filter: drop-shadow(0 3px 0 rgba(108,156,168,.08)); user-select: none; }
    .cloud.one { top: 8px; left: 12%; } .cloud.two { top: 35px; right: 14%; font-size: 2rem; }
    .status {
      position: relative; z-index: 2; width: fit-content; min-height: 38px; margin: 0 auto;
      padding: 5px 15px; border-radius: 999px; background: rgba(255,255,255,.86);
      font-weight: 800; font-variant-numeric: tabular-nums; box-shadow: 0 4px 15px rgba(53,87,94,.08);
    }
    .track { position: absolute; left: 20px; right: 20px; bottom: 24px; height: 126px; }
    .road { position: absolute; left: 0; right: 0; bottom: 0; height: 48px; border-radius: 25px; background: var(--road); box-shadow: inset 0 -5px 0 #d0c9ba; }
    .road::after { content: ""; position: absolute; left: 4%; right: 4%; top: 22px; border-top: 3px dashed rgba(255,255,255,.9); }
    .start, .goal { position: absolute; bottom: 47px; color: #63745d; font-size: .72rem; font-weight: 700; }
    .start { left: 0; } .goal { right: 0; }
    .runner { position: absolute; left: 0; bottom: 36px; width: 55px; text-align: center; transform: translateX(-50%); transition: filter .2s; will-change: transform; }
    .runner .animal { display: block; font-size: 2.75rem; line-height: 1; transform-origin: 50% 100%; filter: drop-shadow(0 4px 2px rgba(46,55,45,.15)); }
    .runner .name { display: block; margin-top: 1px; font-size: .72rem; font-weight: 800; }
    .rabbit { bottom: 77px; }
    .runner.moving .animal { animation: bob .33s ease-in-out infinite alternate; }
    .runner.caught .animal { animation: tada .5s ease both; }
    @keyframes bob { to { transform: translateY(-6px) rotate(-3deg); } }
    @keyframes tada { 35% { transform: scale(1.3) rotate(-8deg); } 70% { transform: scale(1.15) rotate(7deg); } }
    .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 18px; background: var(--paper); }
    .control { padding: 12px 13px; border-radius: 16px; background: #f8f6ef; }
    .control label { display: flex; justify-content: space-between; gap: 8px; font-size: .86rem; font-weight: 750; }
    output { color: var(--ink); font-variant-numeric: tabular-nums; white-space: nowrap; }
    input[type="range"] { width: 100%; margin: 11px 0 2px; accent-color: var(--rabbit); cursor: pointer; }
    .control.turtle-control input { accent-color: var(--turtle); }
    .actions { display: flex; justify-content: center; gap: 10px; padding: 0 18px 18px; background: var(--paper); }
    button { border: 0; border-radius: 999px; padding: 11px 24px; color: white; background: var(--ink); font: inherit; font-weight: 800; cursor: pointer; box-shadow: 0 5px 0 #111b23; }
    button:active { transform: translateY(3px); box-shadow: 0 2px 0 #111b23; }
    button.secondary { color: var(--ink); background: #ece8de; box-shadow: 0 5px 0 #d1cabc; }
    .diagram { margin-top: 18px; padding: 18px 18px 12px; }
    .diagram-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    h2 { margin: 0; font-size: 1.08rem; }
    .diagram-head p { margin: 0; color: var(--muted); font-size: .8rem; }
    canvas { display: block; width: 100%; height: 280px; border-radius: 14px; background: #fffefa; }
    .legend { display: flex; justify-content: center; gap: 20px; margin-top: 8px; color: var(--muted); font-size: .8rem; }
    .dot { display: inline-block; width: 10px; height: 10px; margin-right: 5px; border-radius: 50%; }
    .feedback { margin-top: 28px; padding: 25px; text-align: center; }
    .feedback p { margin: 0 0 10px; font-weight: 700; }
    .feedback a { display: inline-block; padding: 8px 18px; border: 1px solid var(--line); border-radius: 999px; text-decoration: none; background: white; }
    .feedback a:hover { background: var(--cream); }
    @media (max-width: 650px) {
      .page { width: min(100% - 18px, 920px); padding-top: 12px; }
      header { padding-top: 17px; }
      .subtitle { display: block; margin: 6px 0 0; font-size: .38em; }
      .sky { min-height: 235px; padding-inline: 10px; }
      .track { left: 13px; right: 13px; }
      .controls { grid-template-columns: 1fr; gap: 8px; padding: 12px; }
      .control { display: grid; grid-template-columns: 1fr; padding: 8px 12px; }
      .control label { font-size: .83rem; }
      input[type="range"] { margin: 7px 0 0; }
      .diagram { padding: 14px 8px 10px; }
      .diagram-head { padding: 0 6px; }
      canvas { height: 245px; }
    }
    @media (prefers-reduced-motion: reduce) { .runner.moving .animal { animation: none; } }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="../../index.html">← 工房のトップへ</a>
    <header>
      <p class="number">INTELLECTUAL TOY #001</p>
      <h1>追いつけ！ <span class="subtitle">ダイヤグラム実験室</span></h1>
      <p class="lead">ウサギはカメに追いつけるかな？</p>
    </header>

    <section class="card playground" aria-label="追いつくアニメーション">
      <div class="sky">
        <span class="cloud one" aria-hidden="true">☁</span><span class="cloud two" aria-hidden="true">☁</span>
        <div class="status" id="status" aria-live="polite"></div>
        <div class="track">
          <span class="start">スタート</span><span class="goal">むこう</span>
          <div class="road"></div>
          <div class="runner turtle" id="turtle"><span class="animal">🐢</span><span class="name">カメ</span></div>
          <div class="runner rabbit" id="rabbit"><span class="animal">🐇</span><span class="name">ウサギ</span></div>
        </div>
      </div>
      <div class="controls">
        <div class="control turtle-control">
          <label for="turtleSpeed">カメの速さ <output id="turtleOut">1.0 m/秒</output></label>
          <input id="turtleSpeed" type="range" min="0.5" max="3" step="0.5" value="1" aria-label="カメの速さ">
        </div>
        <div class="control">
          <label for="rabbitSpeed">ウサギの速さ <output id="rabbitOut">2.0 m/秒</output></label>
          <input id="rabbitSpeed" type="range" min="0.5" max="4" step="0.5" value="2" aria-label="ウサギの速さ">
        </div>
        <div class="control">
          <label for="delay">ウサギの出発おくれ <output id="delayOut">3.0 秒</output></label>
          <input id="delay" type="range" min="0" max="8" step="0.5" value="3" aria-label="ウサギの出発おくれ">
        </div>
      </div>
      <div class="actions">
        <button id="play" type="button">▶ もう一度見る</button>
        <button id="pause" class="secondary" type="button">一時停止</button>
      </div>
    </section>

    <section class="card diagram" aria-labelledby="diagram-title">
      <div class="diagram-head">
        <h2 id="diagram-title">動きのあと</h2>
        <p>道の上と同じ時間が流れます</p>
      </div>
      <canvas id="chart" role="img" aria-label="カメとウサギが進んだ距離のダイヤグラム"></canvas>
      <div class="legend"><span><i class="dot" style="background:var(--turtle)"></i>カメ</span><span><i class="dot" style="background:var(--rabbit)"></i>ウサギ</span></div>
    </section>

    <section class="card feedback">
      <p>遊んでみてどうでしたか？</p>
     <a href="https://docs.google.com/forms/d/e/1FAIpQLSdDMNP37vNe0P2DGJ-g8AG2vuAKJLnY-Kpj2Z2N6Pct18heug/viewform">
感想を送る
</a>
    </section>
  </main>

  <script>
    (() => {
      const $ = (s) => document.querySelector(s);
      const turtleSpeed = $('#turtleSpeed'), rabbitSpeed = $('#rabbitSpeed'), delay = $('#delay');
      const turtle = $('#turtle'), rabbit = $('#rabbit'), status = $('#status');
      const canvas = $('#chart'), ctx = canvas.getContext('2d');
      let startAt = 0, elapsed = 0, playing = false, raf = 0, caughtCelebrated = false;
      const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

      function values() {
        return { vt: +turtleSpeed.value, vr: +rabbitSpeed.value, wait: +delay.value };
      }
      function catchTime() {
        const { vt, vr, wait } = values();
        if (wait === 0) return 0;
        return vr > vt ? (vr * wait) / (vr - vt) : Infinity;
      }
      function horizon() {
        const hit = catchTime();
        return Number.isFinite(hit) ? Math.max(10, Math.ceil(hit + 2)) : 14;
      }
      function updateLabels() {
        const { vt, vr, wait } = values();
        $('#turtleOut').value = vt.toFixed(1) + ' m/秒';
        $('#rabbitOut').value = vr.toFixed(1) + ' m/秒';
        $('#delayOut').value = wait.toFixed(1) + ' 秒';
      }
      function resultText(current) {
        const hit = catchTime();
        if (!Number.isFinite(hit)) return 'このままだと追いつきません';
        if (current >= hit && hit > 0) return '追いついた！ ' + hit.toFixed(1) + '秒後';
        return hit === 0 ? 'いっしょに出発！' : hit.toFixed(1) + '秒後に追いつきます';
      }
      function reset(autoPlay = true) {
        cancelAnimationFrame(raf);
        elapsed = 0; startAt = performance.now(); playing = autoPlay; caughtCelebrated = false;
        $('#pause').textContent = '一時停止';
        turtle.classList.remove('caught'); rabbit.classList.remove('caught');
        updateLabels(); render();
        if (playing) raf = requestAnimationFrame(tick);
      }
      function tick(now) {
        if (!playing) return;
        elapsed = (now - startAt) / 1000 * (reducedMotion ? 2 : 1);
        const end = horizon();
        if (elapsed >= end) { elapsed = end; playing = false; }
        render();
        if (playing) raf = requestAnimationFrame(tick);
      }
      function render() {
        const { vt, vr, wait } = values();
        const hit = catchTime(), maxT = horizon();
        const turtleD = vt * elapsed;
        const rabbitD = vr * Math.max(0, elapsed - wait);
        const maxD = Math.max(vt * maxT, vr * Math.max(0, maxT - wait), 1);
        const usable = 91;
        turtle.style.left = (4.5 + usable * Math.min(turtleD / maxD, 1)) + '%';
        rabbit.style.left = (4.5 + usable * Math.min(rabbitD / maxD, 1)) + '%';
        turtle.classList.toggle('moving', playing);
        rabbit.classList.toggle('moving', playing && elapsed >= wait);
        if (Number.isFinite(hit) && hit > 0 && elapsed >= hit && !caughtCelebrated) {
          caughtCelebrated = true; turtle.classList.add('caught'); rabbit.classList.add('caught');
        }
        status.textContent = resultText(elapsed);
        drawChart(maxT, maxD, vt, vr, wait, hit);
      }
      function setupCanvas() {
        const rect = canvas.getBoundingClientRect(), dpr = Math.min(devicePixelRatio || 1, 2);
        const w = Math.round(rect.width * dpr), h = Math.round(rect.height * dpr);
        if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        return { w: rect.width, h: rect.height };
      }
      function drawChart(maxT, maxD, vt, vr, wait, hit) {
        const { w, h } = setupCanvas();
        const pad = { l: 48, r: 18, t: 17, b: 38 }, pw = w - 66, ph = h - 55;
        const X = t => pad.l + pw * t / maxT;
        const Y = d => pad.t + ph - ph * d / maxD;
        ctx.clearRect(0, 0, w, h);
        ctx.lineWidth = 1; ctx.strokeStyle = '#e8e3d8'; ctx.fillStyle = '#78838a'; ctx.font = '11px system-ui';
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        for (let i=0; i<=4; i++) {
          const y = pad.t + ph * i/4; ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(w-pad.r,y); ctx.stroke();
          ctx.fillText((maxD*(4-i)/4).toFixed(0), pad.l-7, y);
        }
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        for (let i=0; i<=4; i++) {
          const x = pad.l + pw*i/4; ctx.beginPath(); ctx.moveTo(x,pad.t); ctx.lineTo(x,pad.t+ph); ctx.stroke();
          ctx.fillText((maxT*i/4).toFixed(0), x, pad.t+ph+7);
        }
        ctx.fillStyle = '#65727d'; ctx.font = '12px system-ui';
        ctx.fillText('時間（秒）', pad.l+pw/2, h-16);
        ctx.save(); ctx.translate(13,pad.t+ph/2); ctx.rotate(-Math.PI/2); ctx.fillText('進んだ距離（m）',0,0); ctx.restore();
        const line = (color, fromT, toT, distance, alpha=1) => {
          if (toT <= fromT) return;
          ctx.globalAlpha = alpha; ctx.strokeStyle = color; ctx.lineWidth = alpha < 1 ? 2 : 4; ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(X(fromT),Y(distance(fromT))); ctx.lineTo(X(toT),Y(distance(toT))); ctx.stroke(); ctx.globalAlpha = 1;
        };
        line('#2e9d70',0,maxT,t=>vt*t,.18); line('#ed6a5a',wait,maxT,t=>vr*(t-wait),.18);
        line('#2e9d70',0,Math.min(elapsed,maxT),t=>vt*t);
        line('#ed6a5a',wait,Math.min(elapsed,maxT),t=>vr*(t-wait));
        if (Number.isFinite(hit) && hit <= maxT) {
          const x=X(hit), y=Y(vt*hit);
          ctx.setLineDash([4,4]); ctx.strokeStyle='#a59b85'; ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,pad.t+ph); ctx.stroke(); ctx.setLineDash([]);
          ctx.beginPath(); ctx.fillStyle = elapsed >= hit ? '#f7c948' : '#fffefa'; ctx.strokeStyle='#b88a00'; ctx.lineWidth=2;
          ctx.arc(x,y,6,0,Math.PI*2); ctx.fill(); ctx.stroke();
          if (elapsed >= hit) { ctx.fillStyle='#755900'; ctx.font='bold 11px system-ui'; ctx.textAlign='center'; ctx.fillText('追いついた！',x,Math.max(2,y-23)); }
        }
      }
      [turtleSpeed, rabbitSpeed, delay].forEach(input => input.addEventListener('input', () => reset(true)));
      $('#play').addEventListener('click', () => reset(true));
      $('#pause').addEventListener('click', () => {
        if (playing) { playing=false; cancelAnimationFrame(raf); $('#pause').textContent='つづける'; }
        else { playing=true; startAt=performance.now()-elapsed*1000/(reducedMotion?2:1); $('#pause').textContent='一時停止'; raf=requestAnimationFrame(tick); }
      });
      addEventListener('resize', render);
      reset(true);
    })();
  </script>
</body>
</html>
