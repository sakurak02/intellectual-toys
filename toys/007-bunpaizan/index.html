<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fffaf0">
  <title>ただいま準備中です｜知的玩具工房</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: #25313c;
      background:
        radial-gradient(circle at 10% 8%, #fff1b9 0 7%, transparent 7.2%),
        linear-gradient(180deg, #fffaf0 0%, #f4fbf8 100%);
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    }
    main {
      width: min(680px, calc(100% - 28px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0;
      display: grid;
      place-items: center;
    }
    .back {
      display: inline-block;
      color: #52616b;
      font-size: .9rem;
      text-decoration: none;
      margin-top: 24px;
    }
    .back:hover { text-decoration: underline; }
    .card {
      padding: clamp(36px, 8vw, 64px) 24px;
      border: 1px solid rgba(222,216,202,.85);
      border-radius: 24px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 12px 34px rgba(48,68,61,.08);
      text-align: center;
    }
    h1 {
      margin: 0;
      color: #ed6a5a;
      font-size: clamp(1.6rem, 7vw, 2.5rem);
      line-height: 1.35;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>ただいま準備中です</h1>
      <a class="back" href="../../index.html">← 工房のトップへ</a>
    </section>
  </main>
</body>
</html>
