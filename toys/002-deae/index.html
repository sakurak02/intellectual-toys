<!doctype html>
<html lang="ja">
<head>
<!-- Google tag (gtag.js) -->

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fffaf0">
  <title>#002 出会え！｜知的玩具工房</title>
  <style>
    :root {
      --ink: #25313c; --muted: #65727d; --paper: #fffdf8; --cream: #fff6dc;
      --road: #e3ded2; --a: #2e9d70; --b: #ed6a5a; --sun: #f7c948; --line: #ded8ca;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; color: var(--ink);
      background: radial-gradient(circle at 10% 8%, #fff1b9 0 7%, transparent 7.2%), linear-gradient(180deg, #fffaf0 0%, #f4fbf8 100%);
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif; line-height: 1.6;
    }
    .page { width: min(920px, calc(100% - 28px)); margin: 0 auto; padding: 20px 0 42px; }
    .back { display: inline-flex; gap: .4em; align-items: center; color: #52616b; font-size: .9rem; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    header { padding: 16px 4px 14px; }
    .number { margin: 0 0 3px; color: var(--b); font-size: .8rem; font-weight: 800; letter-spacing: .14em; }
    h1 { margin: 0; font-size: clamp(2rem, 8vw, 3.6rem); line-height: 1.15; letter-spacing: .03em; }
    .lead { margin: 10px 0 0; font-size: clamp(1rem, 3.5vw, 1.25rem); font-weight: 700; }
    .card { background: rgba(255,255,255,.9); border: 1px solid rgba(222,216,202,.85); border-radius: 24px; box-shadow: 0 12px 34px rgba(48,68,61,.08); }
    .playground { overflow: hidden; }
    .sky { position: relative; min-height: 190px; padding: 14px 20px 0; background: linear-gradient(#dff5ff 0 66%, #e8f2c8 66%); }
    .cloud { position: absolute; color: rgba(255,255,255,.92); font-size: 3rem; filter: drop-shadow(0 3px 0 rgba(108,156,168,.08)); user-select: none; }
    .cloud.one { top: 8px; left: 12%; } .cloud.two { top: 35px; right: 14%; font-size: 2rem; }
    .status { position: relative; z-index: 2; width: fit-content; min-height: 38px; margin: 0 auto; padding: 5px 15px; border-radius: 999px; background: rgba(255,255,255,.86); font-weight: 800; font-variant-numeric: tabular-nums; box-shadow: 0 4px 15px rgba(53,87,94,.08); }
    .track { position: absolute; left: 28px; right: 28px; bottom: 15px; height: 105px; }
    .road { position: absolute; left: 0; right: 0; bottom: 0; height: 48px; border-radius: 25px; background: var(--road); box-shadow: inset 0 -5px 0 #d0c9ba; }
    .road::after { content: ""; position: absolute; left: 4%; right: 4%; top: 22px; border-top: 3px dashed rgba(255,255,255,.9); }
    .end { position: absolute; bottom: 46px; color: #63745d; font-size: .72rem; font-weight: 700; }
    .end.left { left: 0; } .end.right { right: 0; }
    .meeting { position: absolute; bottom: 2px; width: 3px; height: 44px; border-radius: 3px; background: var(--sun); transform: translateX(-50%); box-shadow: 0 0 0 4px rgba(247,201,72,.2); transition: left .16s ease; }
    .meeting::before { content: "ここで出会う"; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: max-content; color: #755900; font-size: .7rem; font-weight: 800; }
    .walker { position: absolute; bottom: 38px; width: 54px; text-align: center; transform: translateX(-50%); will-change: left; }
    .walker .person { display: block; font-size: 2.6rem; line-height: 1; transform-origin: 50% 100%; filter: drop-shadow(0 4px 2px rgba(46,55,45,.15)); }
    .walker.b .person { transform: scaleX(-1); }
    .walker .name { display: block; margin-top: 2px; font-size: .72rem; font-weight: 800; }
    .walker.moving .person { animation: bob .32s ease-in-out infinite alternate; }
    .walker.b.moving .person { animation-name: bob-left; }
    .walker.met .person { animation: hello .55s ease both; }
    .walker.b.met .person { animation-name: hello-left; }
    @keyframes bob { to { transform: translateY(-6px) rotate(-3deg); } }
    @keyframes bob-left { from { transform: scaleX(-1); } to { transform: scaleX(-1) translateY(-6px) rotate(-3deg); } }
    @keyframes hello { 35% { transform: scale(1.25) rotate(-7deg); } 70% { transform: scale(1.12) rotate(6deg); } }
    @keyframes hello-left { 0%, 100% { transform: scaleX(-1); } 35% { transform: scaleX(-1) scale(1.25) rotate(-7deg); } 70% { transform: scaleX(-1) scale(1.12) rotate(6deg); } }
    .controls { display: grid; grid-template-columns: 1fr 1fr auto; align-items: center; gap: 10px; padding: 12px 18px; background: var(--paper); }
    .control { padding: 8px 12px; border-radius: 16px; background: #f8f6ef; }
    .control label { display: flex; justify-content: space-between; gap: 8px; font-size: .86rem; font-weight: 750; }
    output { font-variant-numeric: tabular-nums; white-space: nowrap; }
    input[type="range"] { width: 100%; min-height: 30px; margin: 8px 0 0; accent-color: var(--a); cursor: pointer; }
    .control.b input { accent-color: var(--b); }
    .actions { display: flex; justify-content: center; }
    button { min-width: 150px; min-height: 48px; border: 0; border-radius: 999px; padding: 11px 24px; color: white; background: var(--ink); font: inherit; font-weight: 800; cursor: pointer; box-shadow: 0 5px 0 #111b23; }
    button:active { transform: translateY(3px); box-shadow: 0 2px 0 #111b23; }
    .results { margin-top: 18px; padding: 20px; }
    .numbers { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
    .number-card { min-width: 0; padding: 13px 10px; border-radius: 16px; background: #f8f6ef; text-align: center; }
    .number-card span { display: block; color: var(--muted); font-size: .76rem; }
    .number-card strong { display: block; margin-top: 2px; font-size: clamp(1.05rem, 3.5vw, 1.35rem); font-variant-numeric: tabular-nums; }
    .number-card.time { background: var(--cream); }
    .discovery { margin: 19px 0 0; text-align: center; font-weight: 800; }
    .sum { margin: 3px 0 0; text-align: center; font-size: 1.08rem; }
    .thought { margin: 10px 0 0; color: var(--muted); text-align: center; font-weight: 700; }
    .formula { margin: 8px 0 0; color: var(--muted); text-align: center; font-size: .82rem; font-variant-numeric: tabular-nums; }
    .diagram { padding: 10px 18px 8px; border-top: 1px solid var(--line); background: var(--paper); }
    .diagram h2 { margin: 0 0 4px; font-size: .92rem; }
    svg { display: block; width: 100%; max-width: 100%; height: 220px; border-radius: 14px; background: #fffefa; }
    .legend { display: flex; justify-content: center; gap: 20px; margin-top: 2px; color: var(--muted); font-size: .76rem; }
    .dot { display: inline-block; width: 10px; height: 10px; margin-right: 5px; border-radius: 50%; }
    .feedback { margin-top: 18px; padding: 22px; text-align: center; }
    .feedback p { margin: 0 0 10px; font-weight: 700; }
    .feedback a { display: inline-block; padding: 10px 20px; border: 1px solid var(--line); border-radius: 999px; color: var(--ink); text-decoration: none; background: white; font-weight: 800; }
    .feedback a:hover { background: var(--cream); }
    @media (max-width: 650px) {
      .page { width: min(100% - 18px, 920px); padding-top: 12px; }
      header { padding: 14px 4px 16px; }
      .sky { min-height: 220px; padding-inline: 8px; }
      .track { left: 20px; right: 20px; }
      .walker { width: 44px; } .walker .person { font-size: 2.25rem; }
      .controls { grid-template-columns: 1fr; gap: 8px; padding: 12px; }
      .control { padding: 9px 12px; }
      .actions { padding: 3px 0 5px; }
      .numbers { grid-template-columns: repeat(2, 1fr); }
      .number-card.time, .number-card.total { grid-column: 1 / -1; }
      .diagram { padding: 12px 8px 10px; }
      .diagram h2 { padding: 0 6px; }
      svg { height: auto; }
    }
    @media (max-width: 380px) { .meeting::before { font-size: .63rem; } }
    @media (prefers-reduced-motion: reduce) { .walker.moving .person { animation: none; } }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="../../index.html">← 工房のトップへ</a>
    <header>
      <p class="number">INTELLECTUAL TOY #002</p>
      <h1>出会え！</h1>
      <p class="lead">向かい合って歩くと、どこで出会う？</p>
    </header>

    <section class="card playground" aria-label="向かい合って歩くアニメーション">
      <div class="sky">
        <span class="cloud one" aria-hidden="true">☁</span><span class="cloud two" aria-hidden="true">☁</span>
        <div class="status" id="status" aria-live="polite">20分後に出会います</div>
        <div class="track">
          <span class="end left">Aの家</span><span class="end right">Bの家</span>
          <div class="road"></div><div class="meeting" id="meeting" aria-hidden="true"></div>
          <div class="walker" id="walkerA"><span class="person">🚶</span><span class="name">A</span></div>
          <div class="walker b" id="walkerB"><span class="person">🚶</span><span class="name">B</span></div>
        </div>
      </div>
      <div class="controls">
        <div class="control">
          <label for="speedA">Aの速さ <output id="speedAOut">3 m/分</output></label>
          <input id="speedA" type="range" min="1" max="10" step="1" value="3">
        </div>
        <div class="control b">
          <label for="speedB">Bの速さ <output id="speedBOut">2 m/分</output></label>
          <input id="speedB" type="range" min="1" max="10" step="1" value="2">
        </div>
        <div class="actions"><button id="play" type="button">▶ スタート</button></div>
      </div>
      <section class="diagram" aria-labelledby="graph-title">
        <h2 id="graph-title">グラフで見ると、こんな感じ。</h2>
        <svg id="graph" viewBox="0 0 720 250" role="img" aria-label="AとBが向かい合って進み出会う様子のグラフ"></svg>
        <div class="legend"><span><i class="dot" style="background:var(--a)"></i>A</span><span><i class="dot" style="background:var(--b)"></i>B</span></div>
      </section>
    </section>

    <section class="card results" aria-label="出会いの結果">
      <div class="numbers">
        <div class="number-card"><span>Aの速さ</span><strong id="resultSpeedA">3 m/分</strong></div>
        <div class="number-card"><span>Bの速さ</span><strong id="resultSpeedB">2 m/分</strong></div>
        <div class="number-card time"><span>出会うまで</span><strong id="resultTime">20分</strong></div>
        <div class="number-card"><span>Aが進む距離</span><strong id="distanceA">60m</strong></div>
        <div class="number-card"><span>Bが進む距離</span><strong id="distanceB">40m</strong></div>
        <div class="number-card total"><span>合計距離</span><strong>100m</strong></div>
      </div>
      <p class="discovery">Aは <span id="sentenceA">60m</span>、Bは <span id="sentenceB">40m</span> 進んだ</p>
      <p class="sum">合わせて <strong>100m</strong></p>
      <p class="thought">両方から近づくと、距離は一緒に縮んでいく。</p>
      <p class="formula" id="formula">3 + 2 = 5　　100 ÷ 5 = 20</p>
    </section>

    <section class="card feedback" aria-label="感想フォーム">
      <p>遊んでみてどうでしたか？</p>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdDMNP37vNe0P2DGJ-g8AG2vuAKJLnY-Kpj2Z2N6Pct18heug/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer">遊んでみた感想を送る</a>
    </section>
  </main>

  <script>
    (() => {
      const $ = (s) => document.querySelector(s);
      const speedA = $('#speedA'), speedB = $('#speedB');
      const walkerA = $('#walkerA'), walkerB = $('#walkerB'), meeting = $('#meeting');
      let raf = 0, running = false, startedAt = 0;

      const tidy = (n) => Math.abs(n - Math.round(n)) < .005 ? String(Math.round(n)) : n.toFixed(1);
      const values = () => {
        const a = +speedA.value, b = +speedB.value, time = 100 / (a + b);
        return { a, b, time, da: a * time, db: b * time };
      };

      function place(progress = 0) {
        const { da } = values(), meet = da;
        walkerA.style.left = (4 + (meet - 4) * progress) + '%';
        walkerB.style.left = (96 - (96 - meet) * progress) + '%';
        meeting.style.left = meet + '%';
      }

      function update() {
        cancelAnimationFrame(raf); running = false;
        walkerA.classList.remove('moving', 'met'); walkerB.classList.remove('moving', 'met');
        const { a, b, time, da, db } = values();
        $('#speedAOut').value = `${a} m/分`; $('#speedBOut').value = `${b} m/分`;
        $('#resultSpeedA').textContent = `${a} m/分`; $('#resultSpeedB').textContent = `${b} m/分`;
        $('#resultTime').textContent = `${tidy(time)}分`;
        $('#distanceA').textContent = `${tidy(da)}m`; $('#distanceB').textContent = `${tidy(db)}m`;
        $('#sentenceA').textContent = `${tidy(da)}m`; $('#sentenceB').textContent = `${tidy(db)}m`;
        $('#formula').textContent = `${a} + ${b} = ${a+b}　　100 ÷ ${a+b} = ${tidy(time)}`;
        $('#status').textContent = `${tidy(time)}分後、${tidy(da)}mのところで出会います`;
        $('#play').textContent = '▶ スタート';
        place(0); drawGraph();
      }

      function play() {
        cancelAnimationFrame(raf); running = true; startedAt = performance.now();
        walkerA.classList.remove('met'); walkerB.classList.remove('met');
        walkerA.classList.add('moving'); walkerB.classList.add('moving');
        $('#play').textContent = '↻ もう一度';
        const duration = Math.max(2200, Math.min(6000, values().time * 200));
        function tick(now) {
          const p = Math.min(1, (now - startedAt) / duration); place(p);
          $('#status').textContent = p < 1 ? `近づいています… ${tidy(values().time * p)}分` : '出会った！';
          if (p < 1 && running) raf = requestAnimationFrame(tick);
          else {
            running = false; walkerA.classList.remove('moving'); walkerB.classList.remove('moving');
            walkerA.classList.add('met'); walkerB.classList.add('met');
          }
        }
        raf = requestAnimationFrame(tick);
      }

      function drawGraph() {
        const { a, b, time, da } = values(), svg = $('#graph'), maxTime = 50;
        const L=58, R=694, T=16, B=202, W=R-L, H=B-T;
        const x = t => L + W * t / maxTime, y = d => B - H * d / 100;
        let grid = '';
        for (let i=0; i<=4; i++) {
          const gx=L+W*i/4, gy=T+H*i/4;
          grid += `<line x1="${L}" y1="${gy}" x2="${R}" y2="${gy}"/><text x="${L-10}" y="${gy+4}" text-anchor="end">${100-25*i}</text>`;
          grid += `<line x1="${gx}" y1="${T}" x2="${gx}" y2="${B}"/><text x="${gx}" y="${B+21}" text-anchor="middle">${tidy(maxTime*i/4)}</text>`;
        }
        svg.innerHTML = `<style>.grid line{stroke:#e8e3d8;stroke-width:1}.grid text{fill:#65727d;stroke:none;font:12px system-ui,sans-serif}</style><g class="grid">${grid}</g>
          <g fill="#65727d" font-family="system-ui,sans-serif" font-size="12"><text x="376" y="246" text-anchor="middle">時間（分）</text><text transform="translate(17 109) rotate(-90)" text-anchor="middle">Aの家からの距離（m）</text></g>
          <path d="M ${x(0)} ${y(0)} L ${x(time)} ${y(a*time)}" fill="none" stroke="#2e9d70" stroke-width="5" stroke-linecap="round"/>
          <path d="M ${x(0)} ${y(100)} L ${x(time)} ${y(100-b*time)}" fill="none" stroke="#ed6a5a" stroke-width="5" stroke-linecap="round"/>
          <line x1="${x(time)}" y1="${y(da)}" x2="${x(time)}" y2="${B}" stroke="#a59b85" stroke-dasharray="5 5"/>
          <circle cx="${x(time)}" cy="${y(da)}" r="10" fill="#f7c948" stroke="#9c7800" stroke-width="3"/>
          <text x="${x(time)-13}" y="${Math.max(T+14,y(da)-16)}" text-anchor="end" fill="#755900" font-family="system-ui,sans-serif" font-size="13" font-weight="700">出会う</text>`;
      }

      [speedA, speedB].forEach(input => input.addEventListener('input', update));
      $('#play').addEventListener('click', play);
      update();
    })();
  </script>
</body>
</html>
