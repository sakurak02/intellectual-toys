<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fffaf0">
  <title>#004 止まれ！｜知的玩具工房</title>
  <style>
    :root {
      --ink: #25313c; --muted: #65727d; --paper: #fffdf8; --cream: #fff6dc;
      --road: #e3ded2; --a: #2e9d70; --b: #ed6a5a; --sun: #f7c948; --line: #ded8ca;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; color: var(--ink);
      background: radial-gradient(circle at 10% 8%, #fff1b9 0 7%, transparent 7.2%), linear-gradient(180deg, #fffaf0 0%, #f4fbf8 100%);
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif; line-height: 1.6;
    }
    .page { width: min(920px, calc(100% - 28px)); margin: 0 auto; padding: 20px 0 42px; }
    .back { display: inline-flex; gap: .4em; align-items: center; color: #52616b; font-size: .9rem; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    header { padding: 16px 4px 14px; }
    .number { margin: 0 0 3px; color: var(--b); font-size: .8rem; font-weight: 800; letter-spacing: .14em; }
    h1 { margin: 0; font-size: clamp(2rem, 8vw, 3.6rem); line-height: 1.15; letter-spacing: .03em; }
    .lead { margin: 10px 0 0; font-size: clamp(1rem, 3.5vw, 1.25rem); font-weight: 700; }
    .card { background: rgba(255,255,255,.9); border: 1px solid rgba(222,216,202,.85); border-radius: 24px; box-shadow: 0 12px 34px rgba(48,68,61,.08); }
    .playground { overflow: hidden; }
    .sky { position: relative; min-height: 210px; padding: 14px 20px 0; background: linear-gradient(#dff5ff 0 66%, #e8f2c8 66%); }
    .cloud { position: absolute; color: rgba(255,255,255,.92); font-size: 3rem; filter: drop-shadow(0 3px 0 rgba(108,156,168,.08)); user-select: none; }
    .cloud.one { top: 8px; left: 12%; } .cloud.two { top: 35px; right: 14%; font-size: 2rem; }
    .status {
      position: relative; z-index: 2; width: fit-content; min-height: 38px; margin: 0 auto;
      padding: 5px 15px; border-radius: 999px; background: rgba(255,255,255,.86);
      font-weight: 800; font-variant-numeric: tabular-nums; box-shadow: 0 4px 15px rgba(53,87,94,.08);
    }
    .track { position: absolute; left: 28px; right: 28px; bottom: 18px; height: 112px; }
    .road { position: absolute; left: 0; right: 0; bottom: 0; height: 48px; border-radius: 25px; background: var(--road); box-shadow: inset 0 -5px 0 #d0c9ba; }
    .road::after { content: ""; position: absolute; left: 4%; right: 4%; top: 22px; border-top: 3px dashed rgba(255,255,255,.9); }
    .end, .rest-label { position: absolute; bottom: 46px; color: #63745d; font-size: .72rem; font-weight: 700; }
    .end.left { left: 0; }
    .end.right { right: 0; }
    .rest-label { left: 50%; transform: translateX(-50%); color: #755900; }
    .rest-mark { position: absolute; left: 50%; bottom: 2px; width: 4px; height: 48px; border-radius: 4px; background: var(--sun); transform: translateX(-50%); box-shadow: 0 0 0 4px rgba(247,201,72,.2); }
    .walker { position: absolute; bottom: 38px; width: 54px; text-align: center; transform: translateX(-50%); will-change: left; }
    .walker .person { display: block; font-size: 2.6rem; line-height: 1; transform: scaleX(-1); transform-origin: 50% 100%; filter: drop-shadow(0 4px 2px rgba(46,55,45,.15)); }
    .walker .name { display: block; margin-top: 2px; font-size: .72rem; font-weight: 800; }
    .walker .zzz { position: absolute; left: 34px; top: -16px; color: #52616b; font-size: .78rem; font-weight: 900; opacity: 0; transform: translateY(5px); }
    .walker.moving .person { animation: bob-forward .32s ease-in-out infinite alternate; }
    .walker.resting .person { transform: rotate(-90deg) translate(-4px, 3px); animation: breathe 1s ease-in-out infinite alternate; }
    .walker.resting .zzz { opacity: 1; animation: zzz 1.1s ease-in-out infinite alternate; }
    .walker.arrived .person { animation: arrive-forward .5s ease both; }
    @keyframes bob-forward {
      from { transform: scaleX(-1); }
      to { transform: scaleX(-1) translateY(-6px) rotate(-3deg); }
    }
    @keyframes breathe { to { transform: rotate(-90deg) translate(-7px, 3px) scale(1.04); } }
    @keyframes zzz { to { transform: translateY(-3px); opacity: .75; } }
    @keyframes arrive-forward {
      0%, 100% { transform: scaleX(-1); }
      35% { transform: scaleX(-1) scale(1.22) rotate(-7deg); }
      70% { transform: scaleX(-1) scale(1.08) rotate(7deg); }
    }
    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr auto; align-items: center; gap: 10px; padding: 12px 18px; background: var(--paper); }
    .control { min-width: 0; padding: 8px 12px; border-radius: 16px; background: #f8f6ef; }
    .control label { display: flex; justify-content: space-between; gap: 8px; font-size: .86rem; font-weight: 750; }
    .control.check { display: flex; align-items: center; min-height: 62px; }
    .control.check label { justify-content: flex-start; align-items: center; cursor: pointer; }
    output { font-variant-numeric: tabular-nums; white-space: nowrap; }
    input[type="range"] { width: 100%; min-height: 30px; margin: 8px 0 0; accent-color: var(--a); cursor: pointer; }
    input[type="checkbox"] { width: 20px; height: 20px; margin: 0 9px 0 0; accent-color: var(--a); cursor: pointer; }
    .control.rest input { accent-color: var(--sun); }
    .control.after input, .control.view input { accent-color: var(--b); }
    .control.after.hidden { display: none; }
    .actions { display: flex; justify-content: center; gap: 10px; }
    button { min-width: 118px; min-height: 48px; border: 0; border-radius: 999px; padding: 11px 22px; color: white; background: var(--ink); font: inherit; font-weight: 800; cursor: pointer; box-shadow: 0 5px 0 #111b23; }
    button:active { transform: translateY(3px); box-shadow: 0 2px 0 #111b23; }
    button.secondary { color: var(--ink); background: #ece8de; box-shadow: 0 5px 0 #d1cabc; }
    .diagram { padding: 10px 18px 8px; border-top: 1px solid var(--line); background: var(--paper); }
    .diagram h2 { margin: 0 0 4px; font-size: .92rem; }
    svg { display: block; width: 100%; max-width: 100%; height: 250px; border-radius: 14px; background: #fffefa; }
    .legend { display: flex; justify-content: center; gap: 20px; margin-top: 2px; color: var(--muted); font-size: .76rem; }
    .dot { display: inline-block; width: 10px; height: 10px; margin-right: 5px; border-radius: 50%; }
    .results { margin-top: 18px; padding: 20px; }
    .numbers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 9px; }
    .number-card { min-width: 0; padding: 13px 10px; border-radius: 16px; background: #f8f6ef; text-align: center; }
    .number-card span { display: block; color: var(--muted); font-size: .76rem; }
    .number-card strong { display: block; margin-top: 2px; font-size: clamp(1.05rem, 3.5vw, 1.35rem); font-variant-numeric: tabular-nums; }
    .number-card.rest { background: var(--cream); }
    .thought { margin: 14px 0 0; color: var(--muted); text-align: center; font-weight: 700; }
    .feedback { margin-top: 18px; padding: 22px; text-align: center; }
    .feedback p { margin: 0 0 10px; font-weight: 700; }
    .feedback a { display: inline-block; padding: 10px 20px; border: 1px solid var(--line); border-radius: 999px; color: var(--ink); text-decoration: none; background: white; font-weight: 800; }
    .feedback a:hover { background: var(--cream); }
    @media (max-width: 860px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .actions { grid-column: 1 / -1; padding: 3px 0 5px; }
      .numbers { grid-template-columns: repeat(2, 1fr); }
      .number-card.rest { grid-column: 1 / -1; }
    }
    @media (max-width: 650px) {
      .page { width: min(100% - 18px, 920px); padding-top: 12px; }
      header { padding: 14px 4px 16px; }
      .sky { min-height: 220px; padding-inline: 8px; }
      .track { left: 20px; right: 20px; }
      .walker { width: 44px; } .walker .person { font-size: 2.25rem; }
      .walker .zzz { left: 28px; top: -13px; }
      .controls { grid-template-columns: 1fr; gap: 8px; padding: 12px; }
      .control { padding: 9px 12px; }
      .diagram { padding: 12px 8px 10px; }
      .diagram h2 { padding: 0 6px; }
      svg { height: auto; }
      .numbers { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      .walker.moving .person, .walker.resting .person, .walker.resting .zzz { animation: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="../../index.html">← 工房のトップへ</a>
    <header>
      <p class="number">INTELLECTUAL TOY #004</p>
      <h1>止まれ！</h1>
      <p class="lead">途中で休憩したら、グラフはどうなる？</p>
    </header>

    <section class="card playground" aria-label="途中で休憩して歩くアニメーション">
      <div class="sky">
        <span class="cloud one" aria-hidden="true">☁</span><span class="cloud two" aria-hidden="true">☁</span>
        <div class="status" id="status" aria-live="polite">まず50mまで歩こう</div>
        <div class="track">
          <span class="end left">スタート</span><span class="end right">100m</span><span class="rest-label">休憩</span>
          <div class="road"></div><div class="rest-mark" aria-hidden="true"></div>
          <div class="walker" id="walker"><span class="zzz">Zzz</span><span class="person">🐕</span><span class="name">犬</span></div>
        </div>
      </div>
      <div class="controls">
        <div class="control">
          <label for="speed">最初の速さ <output id="speedOut">10 m/秒</output></label>
          <input id="speed" type="range" min="2" max="20" step="1" value="10">
        </div>
        <div class="control rest">
          <label for="restTime">休憩時間 <output id="restOut">3 秒</output></label>
          <input id="restTime" type="range" min="0" max="10" step="0.5" value="3">
        </div>
        <div class="control check">
          <label for="sameSpeed"><input id="sameSpeed" type="checkbox" checked>再開後も同じ速さ</label>
        </div>
        <div class="control after hidden" id="afterControl">
          <label for="afterSpeed">再開後の速さ <output id="afterOut">10 m/秒</output></label>
          <input id="afterSpeed" type="range" min="2" max="20" step="1" value="10">
        </div>
        <div class="control view">
          <label for="viewSpeed">見る速さ <output id="viewOut">1.0 倍</output></label>
          <input id="viewSpeed" type="range" min="0.5" max="2" step="0.5" value="1">
        </div>
        <div class="actions">
          <button id="play" type="button">▶ 再生</button>
          <button id="reset" class="secondary" type="button">リセット</button>
        </div>
      </div>
      <section class="diagram" aria-labelledby="graph-title">
        <h2 id="graph-title">グラフで見ると、止まっている間は水平になる。</h2>
        <svg id="graph" viewBox="0 0 720 278" role="img" aria-label="犬が50m地点で休憩すると距離のグラフが水平になる様子"></svg>
        <div class="legend"><span><i class="dot" style="background:var(--a)"></i>犬</span><span><i class="dot" style="background:var(--sun)"></i>休憩</span></div>
      </section>
    </section>

    <section class="card results" aria-label="休憩の様子">
      <div class="numbers">
        <div class="number-card"><span>道の長さ</span><strong>100m</strong></div>
        <div class="number-card"><span>休憩地点</span><strong>50m</strong></div>
        <div class="number-card rest"><span>止まっている時間</span><strong id="restResult">3秒</strong></div>
        <div class="number-card"><span>ゴールまで</span><strong id="goalTime">13秒</strong></div>
        <div class="number-card"><span>いまの距離</span><strong id="currentDistance">0m</strong></div>
      </div>
      <p class="thought" id="thought">歩くと距離が増える。止まると、距離は変わらない。</p>
    </section>

    <section class="card feedback" aria-label="感想フォーム">
      <p>遊んでみてどうでしたか？</p>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdDMNP37vNe0P2DGJ-g8AG2vuAKJLnY-Kpj2Z2N6Pct18heug/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer">遊んでみた感想を送る</a>
    </section>
  </main>

  <script>
    (() => {
      const $ = (s) => document.querySelector(s);
      const speed = $('#speed'), restTime = $('#restTime'), sameSpeed = $('#sameSpeed');
      const afterSpeed = $('#afterSpeed'), viewSpeed = $('#viewSpeed');
      const afterControl = $('#afterControl'), walker = $('#walker'), graph = $('#graph');
      let raf = 0, running = false, startedAt = 0, pausedAt = 0;
      const totalDistance = 100, restDistance = 50;

      const tidy = (n) => Math.abs(n - Math.round(n)) < .005 ? String(Math.round(n)) : n.toFixed(1);
      const values = () => {
        const v1 = +speed.value, rest = +restTime.value, v2 = sameSpeed.checked ? v1 : +afterSpeed.value, rate = +viewSpeed.value;
        const t1 = restDistance / v1, t2 = (totalDistance - restDistance) / v2, restEnd = t1 + rest, totalT = t1 + rest + t2;
        return { v1, rest, v2, rate, t1, restEnd, totalT };
      };
      const distanceAt = (t) => {
        const { v1, v2, t1, restEnd } = values();
        if (t <= t1) return v1 * t;
        if (t <= restEnd) return restDistance;
        return Math.min(totalDistance, restDistance + v2 * (t - restEnd));
      };
      const phaseAt = (t) => {
        const { t1, restEnd, totalT } = values();
        if (t < t1) return 'walk1';
        if (t < restEnd) return 'rest';
        if (t < totalT) return 'walk2';
        return 'goal';
      };

      function place(t = 0) {
        const dist = distanceAt(t);
        walker.style.left = (4 + 92 * dist / totalDistance) + '%';
        const phase = phaseAt(t);
        walker.classList.toggle('moving', running && (phase === 'walk1' || phase === 'walk2'));
        walker.classList.toggle('resting', phase === 'rest');
        walker.classList.toggle('arrived', phase === 'goal');
      }

      function updateText(t = pausedAt) {
        const { v1, rest, v2, totalT } = values();
        $('#speedOut').value = `${tidy(v1)} m/秒`;
        $('#restOut').value = `${tidy(rest)} 秒`;
        $('#afterOut').value = `${tidy(v2)} m/秒`;
        $('#viewOut').value = `${(+viewSpeed.value).toFixed(1)} 倍`;
        $('#restResult').textContent = `${tidy(rest)}秒`;
        $('#goalTime').textContent = `${tidy(totalT)}秒`;
        $('#currentDistance').textContent = `${tidy(distanceAt(t))}m`;
        afterControl.classList.toggle('hidden', sameSpeed.checked);
        const phase = phaseAt(t);
        $('#status').textContent = phase === 'walk1' ? 'まず50mまで歩こう' : phase === 'rest' ? 'ここで止まるよ' : phase === 'walk2' ? 'また歩き始めた！' : 'ゴール！';
        $('#thought').textContent = phase === 'rest' ? '止まっている間、グラフは横にまっすぐ伸びる。' : '歩くと距離が増える。止まると、距離は変わらない。';
      }

      function update(resetTime = true) {
        cancelAnimationFrame(raf);
        running = false;
        if (resetTime) pausedAt = 0;
        $('#play').textContent = '▶ 再生';
        const t = Math.min(pausedAt, values().totalT);
        place(t); updateText(t); drawGraph(t);
      }

      function play() {
        cancelAnimationFrame(raf);
        running = true;
        startedAt = performance.now() - (pausedAt * 1000 / values().rate);
        $('#play').textContent = '↻ もう一度';
        function tick(now) {
          const { totalT, rate } = values();
          const t = Math.min(totalT, (now - startedAt) / 1000 * rate);
          pausedAt = t;
          place(t); updateText(t); drawGraph(t);
          if (t < totalT && running) raf = requestAnimationFrame(tick);
          else { running = false; place(totalT); updateText(totalT); }
        }
        raf = requestAnimationFrame(tick);
      }

      function drawGraph(currentT = 0) {
        const { t1, rest, restEnd, totalT } = values();
        const maxT = Math.max(12, Math.ceil(totalT + 2));
        const L=58, R=694, T=18, B=224, W=R-L, H=B-T;
        const x = t => L + W * t / maxT, y = m => B - H * m / totalDistance;
        const currentD = distanceAt(currentT);
        let grid = '';
        for (let i=0; i<=4; i++) {
          const gx=L+W*i/4, gy=T+H*i/4;
          grid += `<line x1="${L}" y1="${gy}" x2="${R}" y2="${gy}"/><text x="${L-10}" y="${gy+4}" text-anchor="end">${100-25*i}</text>`;
          grid += `<line x1="${gx}" y1="${T}" x2="${gx}" y2="${B}"/><text x="${gx}" y="${B+21}" text-anchor="middle">${tidy(maxT*i/4)}</text>`;
        }
        let progressPath = `M ${x(0)} ${y(0)}`;
        if (currentT <= t1) {
          progressPath += ` L ${x(currentT)} ${y(currentD)}`;
        } else if (currentT <= restEnd) {
          progressPath += ` L ${x(t1)} ${y(restDistance)} L ${x(currentT)} ${y(restDistance)}`;
        } else {
          progressPath += ` L ${x(t1)} ${y(restDistance)} L ${x(restEnd)} ${y(restDistance)} L ${x(currentT)} ${y(currentD)}`;
        }
        graph.innerHTML = `<style>.grid line{stroke:#e8e3d8;stroke-width:1}.grid text{fill:#65727d;stroke:none;font:12px system-ui,sans-serif}</style><g class="grid">${grid}</g>
          <g fill="#65727d" font-family="system-ui,sans-serif" font-size="12"><text x="376" y="268" text-anchor="middle">時間（秒）</text><text transform="translate(17 121) rotate(-90)" text-anchor="middle">スタートからの距離（m）</text></g>
          <path d="M ${x(0)} ${y(0)} L ${x(t1)} ${y(restDistance)} L ${x(restEnd)} ${y(restDistance)} L ${x(totalT)} ${y(totalDistance)}" fill="none" stroke="#2e9d70" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity=".18"/>
          <path d="${progressPath}" fill="none" stroke="#2e9d70" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="${x(t1)}" y="${y(restDistance)-8}" width="${Math.max(2, x(restEnd)-x(t1))}" height="16" rx="8" fill="#f7c948" opacity=".35"/>
          <line x1="${x(t1)}" y1="${y(restDistance)}" x2="${x(t1)}" y2="${B}" stroke="#a59b85" stroke-dasharray="5 5"/>
          <line x1="${x(restEnd)}" y1="${y(restDistance)}" x2="${x(restEnd)}" y2="${B}" stroke="#a59b85" stroke-dasharray="5 5"/>
          <line x1="${x(t1)}" y1="${B}" x2="${x(t1)}" y2="${B+7}" stroke="#755900" stroke-width="2"/>
          <line x1="${x(restEnd)}" y1="${B}" x2="${x(restEnd)}" y2="${B+7}" stroke="#755900" stroke-width="2"/>
          <text x="${x(t1)}" y="${B+21}" text-anchor="middle" fill="#755900" font-family="system-ui,sans-serif" font-size="12" font-weight="800">${tidy(t1)}</text>
          <text x="${x(restEnd)}" y="${B+21}" text-anchor="middle" fill="#755900" font-family="system-ui,sans-serif" font-size="12" font-weight="800">${tidy(restEnd)}</text>
          <circle cx="${x(currentT)}" cy="${y(currentD)}" r="8" fill="#ed6a5a" stroke="#fffefa" stroke-width="3"/>
          <text x="${Math.min(R-74, Math.max(L+74, (x(t1)+x(restEnd))/2))}" y="${y(restDistance)-18}" text-anchor="middle" fill="#755900" font-family="system-ui,sans-serif" font-size="13" font-weight="800">水平</text>
          <text x="${x(t1)-10}" y="${Math.max(T+16,y(restDistance)-18)}" text-anchor="end" fill="#755900" font-family="system-ui,sans-serif" font-size="12" font-weight="700">${tidy(rest)}秒休憩</text>`;
      }

      [speed, restTime, afterSpeed].forEach(input => input.addEventListener('input', () => update(true)));
      sameSpeed.addEventListener('change', () => update(true));
      viewSpeed.addEventListener('input', () => { updateText(pausedAt); if (!running) drawGraph(pausedAt); });
      $('#play').addEventListener('click', () => { pausedAt = 0; play(); });
      $('#reset').addEventListener('click', () => update(true));
      update();
    })();
  </script>
</body>
</html>
