<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知的玩具工房</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    max-width:1000px;
    margin:auto;
    padding:20px;
    background:#fafafa;
    color:#333;
    line-height:1.7;
}

header{
    text-align:center;
    margin-bottom:40px;
}

h1{
    font-size:2.5rem;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
}

.counter{
    font-size:2rem;
    font-weight:bold;
    margin:20px 0;
}

.grid100{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:6px;
    max-width:620px;
    margin:18px auto 30px;
    padding:14px;
    border:1px solid #e2e2e2;
    border-radius:10px;
    background:#f2f2f2;
}

.cell{
    aspect-ratio:1;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid #d4d4d4;
    border-radius:5px;
    background:#e7e7e7;
    color:#999;
    font-size:.75rem;
    font-variant-numeric:tabular-nums;
    cursor:default;
    user-select:none;
}

.cell.completed{
    border-color:#d49b3d;
    background:#fff1c9;
    color:#714b0c;
    font-weight:bold;
    text-decoration:none;
    cursor:pointer;
    box-shadow:0 2px 5px rgba(128,88,20,.18);
    transition:background .15s ease,transform .15s ease;
}

.cell.completed:hover,
.cell.completed:focus-visible{
    background:#ffe39a;
    transform:translateY(-1px);
}

.cell.completed:focus-visible{
    outline:3px solid rgba(196,132,29,.35);
    outline-offset:2px;
}

.shelf-title{
    margin:0;
    text-align:center;
    font-size:1.1rem;
    color:#555;
}

.section{
    margin-top:50px;
}

.category{
    margin-bottom:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

.card{
    display:block;
    border:1px solid #ddd;
    background:white;
    padding:12px;
    border-radius:8px;
    color:inherit;
    text-decoration:none;
}

.card.completed-card{
    cursor:pointer;
    transition:border-color .15s ease,box-shadow .15s ease,transform .15s ease;
}

.card.completed-card:hover,
.card.completed-card:focus-visible{
    border-color:#d49b3d;
    box-shadow:0 4px 12px rgba(128,88,20,.14);
    transform:translateY(-1px);
}

.card.completed-card:focus-visible{
    outline:3px solid rgba(196,132,29,.35);
    outline-offset:2px;
}

.card small{
    color:#666;
}

footer{
    text-align:center;
    margin-top:60px;
    color:#888;
}

@media (max-width:600px){
    body{
        padding:16px;
    }

    h1{
        font-size:2rem;
    }

    .grid100{
        grid-template-columns:repeat(5,1fr);
        gap:7px;
        padding:12px;
    }

    .cell{
        font-size:.8rem;
    }

    .cards{
        grid-template-columns:1fr;
    }

    .card{
        width:100%;
    }
}
</style>
</head>

<body>

<header>
<h1>知的玩具工房</h1>

<p class="subtitle">
「わからない」を動かしてみる実験室
</p>

<div class="counter">
4 / 100
</div>
</header>

<section aria-labelledby="shelf-title">
<h2 class="shelf-title" id="shelf-title">作品棚</h2>
<div class="grid100" id="grid"></div>
</section>

<div class="section">

<div class="category">
<h2>■ 中学受験算数</h2>

<div class="cards">

<a class="card completed-card" href="toys/001-oitsuke/index.html">
  <strong>#001 追いつけ！</strong><br>
  <small>ダイヤグラム実験室</small>
</a>

<a class="card completed-card" href="toys/002-deae/index.html">
  <strong>#002 出会え！</strong><br>
  <small>向かい合って歩くと、どこで出会う？</small><br>
  <small>中学受験算数 / 速さ / ダイヤグラム</small>
</a>

<a class="card completed-card" href="toys/003-orikaese/index.html">
  <strong>#003 折り返せ！</strong><br>
  <small>行って、戻ると、グラフはどう折れる？</small><br>
  <small>中学受験算数 / 速さ / ダイヤグラム</small>
</a>

<a class="card completed-card" href="toys/004-tomare/index.html">
  <strong>#004 止まれ！</strong><br>
  <small>途中で休憩したら、グラフはどうなる？</small><br>
  <small>中学受験算数 / 速さ / ダイヤグラム</small>
</a>

</div>
</div>

<div class="category">
<h2>■ 数学概念</h2>
<p>まだありません</p>
</div>

<div class="category">
<h2>■ 高校数学</h2>
<p>まだありません</p>
</div>

<div class="category">
<h2>■ ゲーム</h2>
<p>まだありません</p>
</div>

</div>

<footer>
知的玩具100個プロジェクト
</footer>

<script>
const grid=document.getElementById("grid");

const toys=[
    {
        id:1,
        title:"追いつけ！",
        slug:"001-oitsuke",
        completed:true
    },
    {
        id:2,
        title:"出会え！",
        slug:"002-deae",
        completed:true
    },
    {
        id:3,
        title:"折り返せ！",
        slug:"003-orikaese",
        completed:true
    },
    {
        id:4,
        title:"止まれ！",
        slug:"004-tomare",
        completed:true
    }
];

for(let id=1;id<=100;id++){
    const toy=toys.find(item=>item.id===id);
    const number=String(id).padStart(3,"0");

    if(toy?.completed){
        const link=document.createElement("a");
        link.className="cell completed";
        link.href=`toys/${toy.slug}/index.html`;
        link.textContent=number;
        link.title=`#${number} ${toy.title}`;
        link.setAttribute("aria-label",`#${number} ${toy.title}を開く`);
        grid.appendChild(link);
        continue;
    }

    const cell=document.createElement("span");
    cell.className="cell";
    cell.textContent=number;
    cell.setAttribute("aria-label",`#${number} 未完成`);
    grid.appendChild(cell);
}
</script>

</body>
</html>
