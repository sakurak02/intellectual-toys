<!doctype html>
<html lang="ja">
<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fffaf0">
  <title>どうぶつ図鑑｜知的玩具工房</title>
  <style>
    :root {
      --ink: #25313c;
      --muted: #65727d;
      --paper: #fffdf8;
      --cream: #fff6dc;
      --line: #ded8ca;
      --sun: #f7c948;
      --rabbit: #ed6a5a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 8%, #fff1b9 0 7%, transparent 7.2%),
        linear-gradient(180deg, #fffaf0 0%, #f4fbf8 100%);
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
      line-height: 1.7;
    }
    .page {
      width: min(920px, calc(100% - 28px));
      margin: 0 auto;
      padding: 20px 0 48px;
    }
    .back {
      display: inline-flex;
      gap: .4em;
      align-items: center;
      color: #52616b;
      font-size: .9rem;
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }
    header {
      padding: 24px 4px 18px;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.4rem);
      line-height: 1.15;
      letter-spacing: .03em;
    }
    .lead {
      margin: 12px auto 0;
      max-width: 620px;
      color: var(--muted);
      font-weight: 700;
    }
    .counter {
      width: fit-content;
      margin: 18px auto 0;
      padding: 7px 18px;
      border-radius: 999px;
      background: var(--cream);
      color: #714b0c;
      font-size: 1.35rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }
    .card {
      margin-top: 18px;
      padding: 22px;
      border: 1px solid rgba(222,216,202,.85);
      border-radius: 24px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 12px 34px rgba(48,68,61,.08);
    }
    .book-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 8px;
    }
    .animal-cell {
      min-width: 0;
      width: 100%;
      height: 96px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border: 1px solid #e4ddcf;
      border-radius: 12px;
      background: #fffefa;
    }
    .animal-cell.acquired {
      border-color: #dca94b;
      background: linear-gradient(180deg, #fff8df 0%, #ffedb8 100%);
      box-shadow: 0 4px 10px rgba(128,88,20,.16), inset 0 0 0 2px rgba(255,255,255,.55);
    }
    .animal {
      font-size: clamp(1.3rem, 4vw, 2rem);
      line-height: 1;
    }
    .animal-image {
      display: block;
      width: 70%;
      height: auto;
      max-height: 70px;
      object-fit: contain;
      min-height: 0;
    }
    .placeholder {
      color: #d5ccba;
      font-size: clamp(1.2rem, 3.6vw, 1.8rem);
      line-height: 1;
    }
    .animal-number {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }
    .animal-cell.acquired .animal-number {
      color: #714b0c;
    }
    .notice {
      margin: 18px auto 0;
      max-width: 680px;
      color: var(--muted);
      font-size: .82rem;
      text-align: center;
    }
    .message-card {
      max-width: 680px;
      margin: 18px auto 0;
      padding: 18px 20px;
      border: 1px solid #ead7ad;
      border-left: 6px solid var(--sun);
      border-radius: 18px;
      background: rgba(255,246,220,.9);
      box-shadow: 0 8px 22px rgba(128,88,20,.08);
      text-align: center;
      font-weight: 800;
    }
    @media (max-width: 650px) {
      .page { width: min(100% - 18px, 920px); padding-top: 12px; }
      header { padding-top: 18px; }
      .card { padding: 12px; border-radius: 18px; }
      .book-grid { grid-template-columns: repeat(5, 1fr); gap: 7px; }
      .animal-cell { border-radius: 10px; }
      .animal-number { font-size: .66rem; }
      .message-card { padding: 15px 14px; border-left-width: 4px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="../index.html">← トップページへ</a>
    <header>
      <h1>📖 コレクション図鑑</h1>
      <p class="lead">
        知的玩具で遊んでチャレンジに正解すると、<br>
        コレクションが少しずつ増えていきます。
      </p>
      <p class="lead">いろいろなコレクションを集めてみよう！</p>
      <div class="counter" id="progress">0 / 100</div>
    </header>

    <section class="card" aria-label="どうぶつ図鑑の100マス">
      <div class="book-grid" id="bookGrid"></div>
    </section>

    <section class="message-card" aria-label="どうぶつ図鑑からのメッセージ">
      🌱 新しいコレクションとの出会いを楽しみに、<br>
      いろいろな知的玩具で遊んでみよう！
    </section>

    <p class="notice">
      図鑑はこのブラウザに保存されます。<br>
      次回も同じ端末・同じブラウザで遊ぶと、続きから集められます。<br>
      ブラウザのデータを削除したり、別の端末で開いた場合は引き継がれません。
    </p>
  </main>

  <script>
    (() => {
      const storageKey = 'intellectualToysAnimalBook.v1';
      const legacyStorageKeys = [
        'intellectualToysAnimalBook',
        'animalBook',
        'animalCollection',
        'intellectualToysAnimals'
      ];
      const animals = {
        '001': 'うさぎ',
        '002': 'きつね',
        '003': 'ハムスター',
        '004': 'いぬ',
        '005': 'ねずみ',
        '006': 'たぬき',
        '007': 'りす',
        '008': 'いぬ'
      };
      const animalImages = {
        '001': '../assets/001.png',
        '002': '../assets/002.png',
        '003': '../assets/003.png',
        '004': '../assets/004.png',
        '005': '../assets/005.png',
        '006': '../assets/006.png',
        '007': '../assets/007.png',
        '008': '../assets/008.png'
      };
      const grid = document.getElementById('bookGrid');
      const progress = document.getElementById('progress');

      function normalizeAnimalId(value) {
        const id = String(value);
        return /^\d{1,3}$/.test(id) ? id.padStart(3, '0') : id;
      }

      function normalizeAcquired(value) {
        if (Array.isArray(value)) return value.map(normalizeAnimalId);
        if (value && typeof value === 'object') {
          return Object.keys(value).filter(id => value[id]).map(normalizeAnimalId);
        }
        return [];
      }

      function readStoredIds(key) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return [];
          return normalizeAcquired(JSON.parse(raw));
        } catch (error) {
          return [];
        }
      }

      function readAcquired() {
        const ids = new Set(readStoredIds(storageKey));
        legacyStorageKeys.forEach(key => readStoredIds(key).forEach(id => ids.add(id)));
        const acquired = [...ids].sort();
        try {
          localStorage.setItem(storageKey, JSON.stringify(acquired));
        } catch (error) {}
        return acquired;
      }

      const acquired = new Set(readAcquired());
      const validAcquiredCount = new Set(
        readStoredIds(storageKey).filter(id => Object.prototype.hasOwnProperty.call(animals, id))
      ).size;
      progress.textContent = `コレクション ${validAcquiredCount} / 100`;

      for (let i = 1; i <= 100; i++) {
        const id = String(i).padStart(3, '0');
        const animalName = animals[id];
        const cell = document.createElement('div');
        const isAcquired = acquired.has(id) && animalName;
        cell.className = 'animal-cell' + (isAcquired ? ' acquired' : '');
        cell.setAttribute('aria-label', isAcquired ? `${id} ${animalName} 取得済み` : `${id} 未取得`);

        const imageSrc = isAcquired ? animalImages[id] : null;
        const mark = document.createElement(imageSrc ? 'img' : 'span');
        mark.className = imageSrc ? 'animal-image' : isAcquired ? 'animal' : 'placeholder';
        if (imageSrc) {
          mark.src = imageSrc;
          mark.alt = animalName;
        } else {
          mark.textContent = isAcquired ? animalName : '○';
          mark.setAttribute('aria-hidden', 'true');
        }

        const number = document.createElement('span');
        number.className = 'animal-number';
        number.textContent = id;

        cell.append(mark, number);
        grid.appendChild(cell);
      }
    })();
  </script>
</body>
</html>
